backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: public/uploads/products
public_folder: /uploads/products

collections:
  - name: products
    label: Products
    label_singular: Product
    folder: content/products
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Slug, name: slug, widget: string, hint: "URL path /products/[slug]" }
      - label: Category
        name: category
        widget: select
        options:
          - bras
          - panties
          - shapewear
          - sports-bras
      - { label: Price (KSh), name: price, widget: number, value_type: int, min: 0 }
      - { label: Sale Price (KSh), name: salePrice, widget: number, value_type: int, min: 0, required: false }
      - { label: Featured on Homepage, name: featured, widget: boolean, default: false }
      - { label: Short Description, name: description, widget: text }
      - label: Images
        name: images
        widget: list
        summary: "{{fields.image}}"
        field: { label: Image, name: image, widget: image }
      - label: Features
        name: features
        widget: list
        required: false
        field: { label: Feature, name: feature, widget: string }
      - label: Colors
        name: colors
        widget: list
        required: false
        fields:
          - { label: Name, name: name, widget: string }
          - { label: Hex, name: hex, widget: string }
      - label: Band Sizes
        name: bandSizes
        widget: list
        required: false
        field: { label: Size, name: size, widget: number, value_type: int }
      - label: Cup Sizes
        name: cupSizes
        widget: list
        required: false
        field: { label: Cup, name: cup, widget: string }
      - { label: Full Description, name: body, widget: markdown }

  - name: categories
    label: Category Pages
    label_singular: Category Page
    folder: content/categories
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Slug, name: slug, widget: string, hint: "Matches route e.g. bras, panties" }
      - { label: Description, name: description, widget: text }
      - { label: Page Content, name: body, widget: markdown, required: false }
